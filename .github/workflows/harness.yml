name: Harness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests pandas openpyxl azure-identity -q

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          FABRIC_TENANT_ID=ci-placeholder
          FABRIC_CLIENT_ID=ci-placeholder
          FABRIC_CLIENT_SECRET=ci-placeholder
          FABRIC_WORKSPACE_ID=ci-placeholder
          FABRIC_LAKEHOUSE_ID=ci-placeholder
          EOF

      - name: Run Harness
        run: python -m harness.runner --ci

      - name: Upload harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-report
          path: test-reports/harness_report.*
